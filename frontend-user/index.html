<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ConcertGo — 发现你的下一场音乐盛宴</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <!-- 噪点纹理叠加层 -->
    <div class="noise-overlay"></div>

    <!-- Toast -->
    <div id="toast-container"></div>

    <!-- 自定义确认弹窗 -->
    <div class="modal" id="modal-confirm">
        <div class="modal-overlay"></div>
        <div class="modal-content" style="width:400px;text-align:center;">
            <div class="modal-header" style="justify-content:center;">
                <h2 id="confirm-title">确认操作</h2>
            </div>
            <p id="confirm-message" style="color:var(--text-secondary);margin-bottom:24px;"></p>
            <div style="display:flex;gap:12px;justify-content:center;">
                <button class="btn btn-outline" onclick="resolveConfirm(false)">取消</button>
                <button class="btn btn-danger" id="confirm-ok-btn" onclick="resolveConfirm(true)">确定</button>
            </div>
        </div>
    </div>

    <!-- 导航栏 -->
    <nav class="navbar" id="navbar">
        <a href="#" class="nav-brand" onclick="navigateTo('home')">
            <div class="brand-icon"><i data-lucide="disc-3"></i></div>
            <span>Concert<em>Go</em></span>
        </a>
        <div class="nav-center">
            <a href="#" data-page="home" class="nav-link active">
                <i data-lucide="compass"></i><span>发现</span>
            </a>
            <a href="#" data-page="orders" class="nav-link" id="nav-orders" style="display:none;">
                <i data-lucide="ticket"></i><span>我的票夹</span>
            </a>
        </div>
        <div class="nav-right">
            <div class="notification-bell" id="notification-bell" style="display:none;">
                <i data-lucide="bell"></i>
                <span class="badge" id="unread-badge" style="display:none;">0</span>
            </div>
            <div id="auth-buttons">
                <button class="btn btn-ghost" onclick="showModal('login')">登录</button>
                <button class="btn btn-accent" onclick="showModal('register')">注册</button>
            </div>
            <div id="user-info" style="display:none;">
                <div class="user-avatar" id="user-avatar-nav">
                    <i data-lucide="user"></i>
                </div>
                <span id="username-display" class="username-text"></span>
                <button class="btn btn-ghost btn-sm" onclick="logout()">
                    <i data-lucide="log-out" style="width:16px;height:16px;"></i>
                </button>
            </div>
        </div>
    </nav>

    <!-- 通知面板 -->
    <div class="notification-panel" id="notification-panel">
        <div class="notification-header">
            <h3><i data-lucide="bell-ring" style="width:18px;height:18px;"></i> 通知中心</h3>
            <button class="btn btn-text" onclick="markAllRead()">全部已读</button>
        </div>
        <div class="notification-list" id="notification-list"></div>
    </div>

    <!-- 主内容 -->
    <main class="main-content">
        <!-- 首页 -->
        <div id="page-home" class="page active">
            <!-- Hero -->
            <section class="hero">
                <div class="hero-glow hero-glow-1"></div>
                <div class="hero-glow hero-glow-2"></div>
                <div class="hero-content">
                    <p class="hero-eyebrow">— 探索现场音乐的魅力 —</p>
                    <h1 class="hero-title">发现你的下一场<br><span class="text-gradient">音乐盛宴</span></h1>
                    <p class="hero-subtitle">精选演唱会 · 极速抢票 · 沉浸体验</p>
                    <div class="search-box">
                        <div class="search-icon"><i data-lucide="search"></i></div>
                        <input type="text" id="search-input" placeholder="搜索演唱会、艺人、城市...">
                        <div class="custom-select has-icon" id="city-filter" data-value="">
                            <i data-lucide="map-pin" class="cs-icon"></i>
                            <div class="custom-select-trigger" tabindex="0">
                                <span class="trigger-text placeholder">全部城市</span>
                            </div>
                            <div class="custom-select-dropdown">
                                <div class="custom-select-option selected" data-value="">全部城市</div>
                            </div>
                        </div>
                        <button class="btn btn-primary" onclick="searchConcerts()">搜索</button>
                    </div>
                </div>
            </section>

            <!-- 演唱会列表 -->
            <section class="section">
                <div class="section-header">
                    <div>
                        <h2 class="section-title">热门演出</h2>
                        <p class="section-desc">精选即将开演的音乐盛事</p>
                    </div>
                </div>
                <div class="concert-grid" id="concert-grid"></div>
                <div class="pagination" id="concert-pagination"></div>
            </section>
        </div>

        <!-- 演唱会详情 -->
        <div id="page-detail" class="page">
            <div class="detail-container" id="concert-detail"></div>
        </div>

        <!-- 我的订单 -->
        <div id="page-orders" class="page">
            <section class="section">
                <div class="section-header">
                    <div>
                        <h2 class="section-title">我的票夹</h2>
                        <p class="section-desc">管理你的所有演出订单</p>
                    </div>
                </div>
                <div class="order-list" id="order-list"></div>
                <div class="pagination" id="order-pagination"></div>
            </section>
        </div>
    </main>

    <!-- 登录弹窗 -->
    <div class="modal" id="modal-login">
        <div class="modal-overlay" onclick="closeModal('login')"></div>
        <div class="modal-content">
            <button class="modal-close" onclick="closeModal('login')"><i data-lucide="x"></i></button>
            <div class="modal-brand"><i data-lucide="disc-3"></i></div>
            <h2 class="modal-title">欢迎回来</h2>
            <p class="modal-subtitle">登录以继续你的音乐之旅</p>
            <form id="login-form" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label>用户名</label>
                    <div class="input-with-icon">
                        <i data-lucide="user" class="input-icon"></i>
                        <input type="text" name="username" required placeholder="请输入用户名">
                    </div>
                </div>
                <div class="form-group">
                    <label>密码</label>
                    <div class="input-with-icon">
                        <i data-lucide="lock" class="input-icon"></i>
                        <input type="password" name="password" required placeholder="请输入密码">
                    </div>
                </div>
                <div class="form-group checkbox-group">
                    <label>
                        <input type="checkbox" id="remember-me" class="custom-checkbox">
                        <span class="checkbox-mark"><i data-lucide="check" class="checkbox-icon"></i></span>
                        <span>记住密码（7天）</span>
                    </label>
                </div>
                <button type="submit" class="btn btn-primary btn-block" id="login-btn">登 录</button>
            </form>
            <p class="modal-footer-text">还没有账号？<a href="#" onclick="showModal('register');closeModal('login');">立即注册</a></p>
        </div>
    </div>

    <!-- 注册弹窗 -->
    <div class="modal" id="modal-register">
        <div class="modal-overlay" onclick="closeModal('register')"></div>
        <div class="modal-content">
            <button class="modal-close" onclick="closeModal('register')"><i data-lucide="x"></i></button>
            <div class="modal-brand"><i data-lucide="disc-3"></i></div>
            <h2 class="modal-title">加入我们</h2>
            <p class="modal-subtitle">开启你的现场音乐之旅</p>
            <form id="register-form" onsubmit="handleRegister(event)">
                <div class="form-group">
                    <label>用户名</label>
                    <div class="input-with-icon">
                        <i data-lucide="user" class="input-icon"></i>
                        <input type="text" name="username" required minlength="3" maxlength="20" placeholder="3-20个字符">
                    </div>
                </div>
                <div class="form-group">
                    <label>密码</label>
                    <div class="input-with-icon">
                        <i data-lucide="lock" class="input-icon"></i>
                        <input type="password" name="password" required
                               pattern="^(?=.*[a-z])(?=.*[A-Z])(?=.*\d).{8,20}$"
                               title="密码需8-20位，包含大小写字母和数字"
                               placeholder="8-20位，含大小写字母和数字">
                    </div>
                </div>
                <div class="form-group">
                    <label>邮箱</label>
                    <div class="input-with-icon">
                        <i data-lucide="mail" class="input-icon"></i>
                        <input type="email" name="email" placeholder="选填">
                    </div>
                </div>
                <div class="form-group">
                    <label>手机号</label>
                    <div class="input-with-icon">
                        <i data-lucide="smartphone" class="input-icon"></i>
                        <input type="tel" name="phone" pattern="^1[3-9]\d{9}$" title="请输入正确的手机号" placeholder="选填">
                    </div>
                </div>
                <button type="submit" class="btn btn-primary btn-block" id="register-btn">注 册</button>
            </form>
            <p class="modal-footer-text">已有账号？<a href="#" onclick="showModal('login');closeModal('register');">立即登录</a></p>
        </div>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <div class="footer-inner">
            <div class="footer-brand">
                <i data-lucide="disc-3" style="width:20px;height:20px;"></i>
                <span>Concert<em>Go</em></span>
            </div>
            <p class="footer-copy">&copy; 2024 ConcertGo. 让每一场演出都值得期待。</p>
        </div>
    </footer>

    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
